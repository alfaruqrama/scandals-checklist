<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SCANDALS 2.0 — Checklist Tim</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #f5f2ee;
  --bg2:      #edeae5;
  --surface:  #ffffff;
  --border:   #ddd9d2;
  --border2:  #c8c3bb;
  --text:     #1a1714;
  --text2:    #5a5450;
  --text3:    #9c9590;
  --accent:   #c0392b;
  --accent2:  #e67e22;
  --green:    #27ae60;
  --blue:     #2980b9;
  --purple:   #8e44ad;
  --shadow:   0 1px 3px rgba(0,0,0,0.07), 0 4px 12px rgba(0,0,0,0.04);
  --shadow2:  0 2px 8px rgba(0,0,0,0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Instrument Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 90px;
}

/* ── HEADER ── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 18px 18px 14px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow);
}

.header-row {
  display: flex;
  align-items: center;
  gap: 11px;
  margin-bottom: 14px;
}

.logo-mark {
  width: 38px; height: 38px;
  background: var(--accent);
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.header-text h1 {
  font-family: 'Instrument Serif', serif;
  font-size: 17px;
  font-weight: 400;
  color: var(--text);
  line-height: 1.2;
}

.header-text p {
  font-size: 11px;
  color: var(--text3);
  margin-top: 2px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.6px;
}

/* sync indicator */
.sync-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.sync-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 4px 10px;
}

.sync-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--border2);
  transition: background 0.3s;
}

.sync-dot.syncing { background: var(--accent2); animation: pulse 1s infinite; }
.sync-dot.synced  { background: var(--green); }
.sync-dot.error   { background: var(--accent); }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.4; }
}

/* ── OVERALL PROGRESS ── */
.progress-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
}

.prog-top {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 8px;
}

.prog-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.prog-fraction {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
}

.prog-track {
  background: var(--border);
  border-radius: 999px;
  height: 6px;
  overflow: hidden;
  margin-bottom: 8px;
}

.prog-fill {
  height: 100%;
  border-radius: 999px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  transition: width 0.5s cubic-bezier(.4,0,.2,1);
}

.prog-chips {
  display: flex;
  gap: 10px;
}

.chip {
  font-size: 11px;
  font-weight: 500;
  color: var(--text3);
  display: flex;
  align-items: center;
  gap: 4px;
}

.chip-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
}

/* ── FILTER TABS ── */
.filters {
  display: flex;
  gap: 7px;
  padding: 12px 18px;
  overflow-x: auto;
  scrollbar-width: none;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.filters::-webkit-scrollbar { display: none; }

.f-btn {
  flex-shrink: 0;
  font-family: 'Instrument Sans', sans-serif;
  font-size: 12px;
  font-weight: 600;
  padding: 5px 13px;
  border-radius: 999px;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.18s;
  white-space: nowrap;
}

.f-btn.active {
  background: var(--text);
  border-color: var(--text);
  color: #fff;
}

/* ── SECTIONS ── */
.sections {
  padding: 14px 18px 0;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.sec-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: var(--shadow);
}

.sec-head {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 13px 14px;
  cursor: pointer;
  user-select: none;
  background: var(--surface);
}

.sec-icon {
  font-size: 15px;
  flex-shrink: 0;
  width: 30px; height: 30px;
  background: var(--bg);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--border);
}

.sec-info { flex: 1; min-width: 0; }
.sec-info h2 {
  font-size: 12.5px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.sec-info p {
  font-size: 10.5px;
  color: var(--text3);
  margin-top: 1px;
}

.sec-right {
  display: flex;
  align-items: center;
  gap: 7px;
  flex-shrink: 0;
}

.sec-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 5px;
  background: var(--bg2);
  color: var(--text2);
  border: 1px solid var(--border);
}

.sec-badge.complete {
  background: #edfaf3;
  color: var(--green);
  border-color: #b3e8cc;
}

.chevron {
  font-size: 10px;
  color: var(--text3);
  transition: transform 0.22s;
}

.sec-card.collapsed .chevron { transform: rotate(-90deg); }

/* section mini progress line */
.sec-prog {
  height: 2px;
  background: var(--bg2);
}

.sec-prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  transition: width 0.4s;
}

/* ── ITEMS ── */
.sec-body { overflow: hidden; }
.sec-card.collapsed .sec-body { display: none; }

.item {
  display: flex;
  align-items: flex-start;
  gap: 11px;
  padding: 11px 14px;
  border-top: 1px solid var(--bg2);
  cursor: pointer;
  transition: background 0.12s;
  -webkit-user-select: none;
  user-select: none;
  position: relative;
}

.item:active { background: var(--bg); }
.item.done   { background: #fafcfa; }
.item.done .item-text { text-decoration: line-through; color: var(--text3); }

.cb {
  width: 20px; height: 20px;
  border-radius: 5px;
  border: 1.5px solid var(--border2);
  flex-shrink: 0;
  margin-top: 1px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.18s;
  background: white;
}

.item.done .cb {
  background: var(--green);
  border-color: var(--green);
}

.cb-check {
  color: white;
  font-size: 11px;
  font-weight: 700;
  opacity: 0;
  transform: scale(0.4);
  transition: all 0.18s;
}

.item.done .cb-check {
  opacity: 1;
  transform: scale(1);
}

.item-body { flex: 1; min-width: 0; }

.item-text {
  font-size: 13px;
  line-height: 1.45;
  color: var(--text);
  font-weight: 500;
}

.tag {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 10px;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: 4px;
  margin-top: 5px;
  letter-spacing: 0.2px;
}

.tag-foto   { background: #eef4ff; color: #2563eb; }
.tag-data   { background: #fff8ec; color: #d97706; }
.tag-gambar { background: #f5f0ff; color: #7c3aed; }
.tag-teks   { background: #ecfdf5; color: #059669; }

/* item saving indicator */
.item-saving {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 10px;
  color: var(--accent2);
  opacity: 0;
  transition: opacity 0.2s;
}
.item.saving .item-saving { opacity: 1; }

/* ── BOTTOM BAR ── */
.bottom-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 10px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 200;
  box-shadow: 0 -4px 16px rgba(0,0,0,0.07);
}

.bb-stat {
  display: flex;
  align-items: baseline;
  gap: 5px;
}

.bb-pct {
  font-family: 'Instrument Serif', serif;
  font-size: 26px;
  color: var(--accent);
  line-height: 1;
}

.bb-label {
  font-size: 12px;
  color: var(--text3);
  font-weight: 500;
}

.bb-actions {
  display: flex;
  gap: 8px;
}

.btn-small {
  font-family: 'Instrument Sans', sans-serif;
  font-size: 12px;
  font-weight: 600;
  padding: 7px 13px;
  border-radius: 8px;
  cursor: pointer;
  border: 1.5px solid var(--border);
  background: white;
  color: var(--text2);
  transition: all 0.15s;
}

.btn-small:active { background: var(--bg2); }

.btn-reset {
  border-color: #fca5a5;
  color: var(--accent);
  background: #fff5f5;
}

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--text);
  color: white;
  font-size: 12px;
  font-weight: 600;
  padding: 8px 16px;
  border-radius: 999px;
  opacity: 0;
  transition: all 0.25s;
  z-index: 300;
  white-space: nowrap;
  pointer-events: none;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── CONFETTI ── */
.confetti-layer {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 999;
}

@keyframes cf-fall {
  from { transform: translateY(-12px) rotate(0deg); opacity: 1; }
  to   { transform: translateY(100vh)  rotate(540deg); opacity: 0; }
}

.cf {
  position: absolute;
  border-radius: 2px;
  animation: cf-fall linear forwards;
}

/* empty state */
.empty-state {
  text-align: center;
  padding: 48px 20px;
  color: var(--text3);
  font-size: 13px;
}
.empty-state .emoji { font-size: 36px; margin-bottom: 10px; }

/* loading overlay */
.loading-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 999;
  gap: 14px;
}

.loading-spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.loading-text {
  font-size: 13px;
  color: var(--text3);
  font-weight: 500;
}
</style>
</head>

      {id:'a_02',text:'Section 7.3 — Foto Sosialisasi Internal (Rapat Tim Lab)',tag:'foto'},
      {id:'a_03',text:'Section 7.3 — Foto Edukasi Pasien di Ruang Tunggu',tag:'foto'},
      {id:'a_04',text:'Section 7.3 — Foto Poster Tutorial di Area Laboratorium',tag:'foto'},
      {id:'a_05',text:'Section 7.6 — Data tren respons rate Jan 2026',tag:'data'},
      {id:'a_06',text:'Section 7.6 — Data tren respons rate Feb 2026',tag:'data'},
      {id:'a_07',text:'Section 7.6 — Data tren respons rate Mar 2026',tag:'data'},
      {id:'a_08',text:'Section 7.6 — Data tren respons rate Apr 2026',tag:'data'},
      {id:'a_09',text:'Section 7.6 — Data tren respons rate Mei 2026',tag:'data'},
      {id:'a_10',text:'Section 7.6 — Data tren respons rate Jun 2026',tag:'data'},
      {id:'a_11',text:'Section 7.6 — Data tren respons rate Jul 2026',tag:'data'},
      {id:'a_12',text:'Section 7.6 — Data tren respons rate Ags 2026',tag:'data'},
      {id:'a_13',text:'Section 7.6 — Data tren respons rate Sep 2026',tag:'data'},
      {id:'a_14',text:'Section 7.6 — Insert Grafik Tren Respons Rate (Okt 2025–Sep 2026)',tag:'gambar'},
    ]
  }
];

const TOTAL = SECTIONS.reduce((s, sec) => s + sec.items.length, 0);
const STORAGE_KEY = 'scandals2_checked';

// ── STATE ─────────────────────────────────────────────────────────────────
let checked  = {};   // { itemId: true/false }
let collapsed = {};
let activeFilter = 'all';
let saveTimeout = null;
let isLoading = true;

// ── STORAGE API ───────────────────────────────────────────────────────────
async function storageGet(key) {
  try {
    const res = await window.storage.get(key, true); // shared=true
    return res ? JSON.parse(res.value) : null;
  } catch(e) { return null; }
}

async function storageSet(key, value) {
  try {
    await window.storage.set(key, JSON.stringify(value), true); // shared=true
    return true;
  } catch(e) { return false; }
}

// ── SYNC ──────────────────────────────────────────────────────────────────
function setSyncState(state, msg) {
  const dot   = document.getElementById('sync-dot');
  const label = document.getElementById('sync-label');
  dot.className   = 'sync-dot ' + state;
  label.textContent = msg;
}

async function loadFromStorage() {
  setSyncState('syncing', 'Mengambil data...');
  const data = await storageGet(STORAGE_KEY);
  if (data && typeof data === 'object') {
    checked = data;
  }
  setSyncState('synced', 'Tersinkron — ' + fmtTime());
}

async function saveToStorage() {
  setSyncState('syncing', 'Menyimpan...');
  const ok = await storageSet(STORAGE_KEY, checked);
  if (ok) {
    setSyncState('synced', 'Tersimpan — ' + fmtTime());
  } else {
    setSyncState('error', 'Gagal menyimpan');
    showToast('⚠️ Gagal menyimpan — coba lagi');
  }
}

function scheduleSave() {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => saveToStorage(), 600);
}

function fmtTime() {
  return new Date().toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' });
}

// ── PROGRESS ──────────────────────────────────────────────────────────────
function doneCount() {
  return Object.values(checked).filter(Boolean).length;
}

function updateOverall() {
  const done = doneCount();
  const pct  = Math.round((done / TOTAL) * 100);
  document.getElementById('frac').textContent      = `${done} / ${TOTAL}`;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('c-done').textContent    = `${done} selesai`;
  document.getElementById('c-rem').textContent     = `${TOTAL - done} belum`;
  document.getElementById('c-pct').textContent     = `${pct}%`;
  document.getElementById('bb-pct').textContent    = `${pct}%`;
}

function updateSecProgress(secId) {
  const sec  = SECTIONS.find(s => s.id === secId);
  if (!sec) return;
  const done = sec.items.filter(i => checked[i.id]).length;
  const pct  = sec.items.length ? (done / sec.items.length) * 100 : 0;
  const fill = document.getElementById(`spf-${secId}`);
  const badge= document.getElementById(`sbd-${secId}`);
  if (fill)  fill.style.width = pct + '%';
  if (badge) {
    badge.textContent = `${done}/${sec.items.length}`;
    badge.className   = 'sec-badge' + (done === sec.items.length ? ' complete' : '');
  }
}

// ── RENDER ────────────────────────────────────────────────────────────────
const tagLabel = { foto:'📷 Foto', data:'📊 Data', gambar:'🖼️ Gambar', teks:'📝 Teks' };
const tagClass = { foto:'tag-foto', data:'tag-data', gambar:'tag-gambar', teks:'tag-teks' };

function matchFilter(item) {
  if (activeFilter === 'all')   return true;
  if (activeFilter === 'belum') return !checked[item.id];
  return item.tag === activeFilter;
}

function render() {
  const container = document.getElementById('sections');
  container.innerHTML = '';

  let anyVisible = false;

  SECTIONS.forEach(sec => {
    const visible = sec.items.filter(matchFilter);
    if (!visible.length) return;
    anyVisible = true;

    const done  = sec.items.filter(i => checked[i.id]).length;
    const total = sec.items.length;
    const pct   = total ? (done / total) * 100 : 0;
    const isCol = collapsed[sec.id];

    const card = document.createElement('div');
    card.className = 'sec-card' + (isCol ? ' collapsed' : '');
    card.id = `sec-${sec.id}`;

    card.innerHTML = `
      <div class="sec-head" onclick="toggleSec('${sec.id}')">
        <div class="sec-icon">${sec.icon}</div>
        <div class="sec-info">
          <h2>${sec.title}</h2>
          <p>${sec.sub}</p>
        </div>
        <div class="sec-right">
          <span class="sec-badge ${done===total?'complete':''}" id="sbd-${sec.id}">${done}/${total}</span>
          <span class="chevron">▼</span>
        </div>
      </div>
      <div class="sec-prog">
        <div class="sec-prog-fill" id="spf-${sec.id}" style="width:${pct}%"></div>
      </div>
      <div class="sec-body">
        ${visible.map(item => `
          <div class="item ${checked[item.id]?'done':''}" id="item-${item.id}" onclick="toggle('${item.id}')">
            <div class="cb"><span class="cb-check">✓</span></div>
            <div class="item-body">
              <div class="item-text">${item.text}</div>
              <span class="tag ${tagClass[item.tag]}">${tagLabel[item.tag]}</span>
            </div>
            <span class="item-saving">↑</span>
          </div>
        `).join('')}
      </div>
    `;

    container.appendChild(card);
  });

  if (!anyVisible) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="emoji">🎉</div>
        Tidak ada item yang cocok.<br>Semua sudah beres di filter ini!
      </div>`;
  }
}

// ── INTERACTIONS ──────────────────────────────────────────────────────────
function toggle(id) {
  checked[id] = !checked[id];

  const el = document.getElementById(`item-${id}`);
  if (el) {
    el.className = 'item ' + (checked[id] ? 'done' : '') + ' saving';
    setTimeout(() => el.classList.remove('saving'), 800);
  }

  const sec = SECTIONS.find(s => s.items.some(i => i.id === id));
  if (sec) updateSecProgress(sec.id);
  updateOverall();
  scheduleSave();

  if (checked[id]) confetti();
  if (doneCount() === TOTAL) {
    showToast('🎉 Semua item selesai! Luar biasa!');
    for (let i = 0; i < 6; i++) setTimeout(confetti, i * 150);
  }
}

function toggleSec(id) {
  collapsed[id] = !collapsed[id];
  const card = document.getElementById(`sec-${id}`);
  if (card) card.className = 'sec-card' + (collapsed[id] ? ' collapsed' : '');
}

// filter
document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.f-btn');
  if (!btn) return;
  document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.f;
  render();
});

// refresh
document.getElementById('refresh-btn').addEventListener('click', async () => {
  setSyncState('syncing', 'Mengambil data...');
  await loadFromStorage();
  render();
  updateOverall();
  showToast('✓ Data diperbarui');
});

// reset
document.getElementById('reset-btn').addEventListener('click', async () => {
  if (!confirm('Reset semua centangan tim? Ini akan menghapus semua progress yang sudah disimpan bersama.')) return;
  checked = {};
  await saveToStorage();
  render();
  updateOverall();
  showToast('↺ Progress direset');
});

// ── TOAST ─────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── CONFETTI ──────────────────────────────────────────────────────────────
function confetti() {
  const layer  = document.getElementById('confetti');
  const colors = ['#c0392b','#e67e22','#27ae60','#2980b9','#8e44ad','#f1c40f'];
  for (let i = 0; i < 7; i++) {
    const el = document.createElement('div');
    el.className = 'cf';
    el.style.cssText = `
      left:${15 + Math.random()*70}%;
      top:-8px;
      width:${5+Math.random()*6}px;
      height:${5+Math.random()*6}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${0.7+Math.random()*0.9}s;
      animation-delay:${Math.random()*0.25}s;
    `;
    layer.appendChild(el);
    setTimeout(() => el.remove(), 1800);
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────
(async () => {
  await loadFromStorage();
  isLoading = false;
  document.getElementById('loading').style.display = 'none';
  render();
  updateOverall();
})();
</script>
</body>
</html>
